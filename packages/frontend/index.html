<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="icon" type="image/jpeg" sizes="32x32" href="/pw.jpg" />
  <link rel="icon" type="image/jpeg" sizes="16x16" href="/pw.jpg" />
  <link rel="apple-touch-icon" sizes="180x180" href="/pw.jpg" />
  <link rel="manifest" href="/manifest.json" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#080b14" />
  <meta name="application-name" content="ClickNich" />
  <meta name="apple-mobile-web-app-title" content="ClickNich" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>ClickNich</title>

  <!-- Open Graph / Facebook / WhatsApp -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="ClickNich" />
  <meta property="og:description" content="Plataforma para criar aplicativos personalizados para infoprodutos" />
  <meta property="og:image" content="https://app.clicknich.com/icon.jpeg" />
  <meta property="og:url" content="https://app.clicknich.com" />
  <meta property="og:site_name" content="ClickNich" />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="ClickNich" />
  <meta name="twitter:description" content="Plataforma para criar aplicativos personalizados para infoprodutos" />
  <meta name="twitter:image" content="https://app.clicknich.com/icon.jpeg" />

  <!-- Preload de assets críticos -->
  <link rel="preload" href="/pw.jpg" as="image" type="image/jpeg" />

  <!-- Preconnect para Supabase (reduz latência DNS+TCP+TLS) -->
  <link rel="preconnect" href="https://cgeqtodbisgwvhkaahiy.supabase.co" crossorigin />
  <link rel="dns-prefetch" href="https://cgeqtodbisgwvhkaahiy.supabase.co" />

  <!-- Preconnect para Stripe -->
  <link rel="preconnect" href="https://js.stripe.com" crossorigin />
  <link rel="dns-prefetch" href="https://js.stripe.com" />
  <link rel="preconnect" href="https://api.stripe.com" crossorigin />

  <!-- Preconnect para API Cloudflare Workers (checkout/payment) -->
  <link rel="preconnect" href="https://api.clicknich.com" crossorigin />
  <link rel="dns-prefetch" href="https://api.clicknich.com" />

  <!-- Preconnect para Highcharts CDN maps -->
  <link rel="dns-prefetch" href="https://code.highcharts.com" />
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
